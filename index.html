<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile-Card</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Boxicons CSS-->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="Profile-Card">
      <div class="image">
        <img src="Asset/dp.png" alt="" class="profile-img" />
      </div>

      <div class="text-data">
        <span class="name">Dhrubo Chandra Roy</span>
        <span class="hobby">E N T H U S I A S T</span>
      </div>

      <div class="media-buttons">
        <a href="#" style="background: #3067d3" class="link">
          <i class="bx bxl-facebook"></i>
        </a>

        <a href="#" style="background: #1da1f2" class="link">
          <i class="bx bxl-twitter"></i>
        </a>

        <a href="#" style="background: #1923de" class="link">
          <i class="bx bxl-linkedin"></i>
        </a>

        <a href="#" style="background: black" class="link">
          <i class="bx bxl-github"></i>
        </a>
      </div>

      <div class="buttons">
        <button class="button">Download CV</button>
        <button class="button">Message</button>
      </div>

      <div class="analytics">
        <div class="data">
          <i class="bx bx-heart"></i>
          <span class="number">103k</span>
        </div>

        <div class="data">
          <i class="bx bx-message-rounded"></i>
          <span class="number">78k</span>
        </div>

        <div class="data">
          <i class="bx bx-share"></i>
          <span class="number">51k</span>
        </div>
      </div>
    </div>
  </body>
</html>
